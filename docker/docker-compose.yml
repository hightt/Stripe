services:
  php:
    build:
      context: ./php
    volumes:
      - ../:/var/www/stripe:rw
    extra_hosts:
      - "host.docker.internal:host-gateway" # Ważne dla Xdebug
    environment:
      XDEBUG_MODE: debug
      XDEBUG_CONFIG: "client_host=host.docker.internal client_port=9003"
    depends_on:
      - db
    networks:
      - stripe_network

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/stripe
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      db:
        condition: service_healthy
    networks:
      - stripe_network

  db:
    image: mysql:8.4
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
    - stripe_db_data:/var/lib/mysql
    networks:
      - stripe_network

volumes:
  stripe_db_data:
    driver: local

networks:
  stripe_network:
    driver: bridge
